name: contribuicoes-issues

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Processa contribuições
        env:
          TOKEN_ISSUES: ${{ secrets.TOKEN_ISSUES }}
        run: |
          ./issues.sh | tee /tmp/commit_msg.txt
          ./build-mkdocs.sh

      - name: Commita e envia as alterações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff-index --quiet HEAD --; then
            echo "Nenhuma alteração para commitar."
            exit 1
          else
            COMMIT_MSG=$(cat /tmp/commit_msg.txt)
            git commit -m "$COMMIT_MSG" -m "[skip ci]"
            git push
          fi

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
